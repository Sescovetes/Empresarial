<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F6E56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Avisos">
<meta name="description" content="Tablón de avisos — Asociación Farmacéutica">
<title>Avisos · Asociación Farmacéutica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #1D9E75;
    --teal-dark: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-mid: #5DCAA5;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --red-dark: #A32D2D;
    --amber: #EF9F27;
    --amber-light: #FAEEDA;
    --amber-dark: #854F0B;
    --blue: #378ADD;
    --blue-light: #E6F1FB;
    --blue-dark: #185FA5;
    --purple: #7F77DD;
    --purple-light: #EEEDFE;
    --purple-dark: #534AB7;
    --pink: #D4537E;
    --pink-light: #FBEAF0;
    --pink-dark: #993556;
    --green: #639922;
    --green-light: #EAF3DE;
    --green-dark: #3B6D11;
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --text: #1A1A18;
    --text2: #5C5B56;
    --text3: #9A9892;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 14px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1E1E1C;
      --surface2: #282826;
      --text: #F0EEE9;
      --text2: #A8A6A0;
      --text3: #6A6864;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --teal-light: #0a2e22;
      --red-light: #2a0f0f;
      --amber-light: #2a1e06;
      --blue-light: #0c1e35;
      --purple-light: #1a1840;
      --pink-light: #2a0f1a;
      --green-light: #0f1e04;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }

  /* ── HEADER ── */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--teal-dark);
    padding: calc(var(--safe-top) + 14px) 18px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .header-icon {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }

  .header-icon svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .header-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: #fff; line-height: 1.1; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 1px; }

  .header-badge {
    background: var(--red);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    min-width: 22px;
    height: 22px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 6px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .stats-bar::-webkit-scrollbar { display: none; }

  .stat-pill {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text2);
  }
  .stat-pill strong { font-weight: 600; color: var(--text); font-size: 14px; }
  .stat-pill.urgent strong { color: var(--red); }

  /* ── SEARCH ── */
  .search-wrap {
    padding: 0 16px 12px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 28px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; stroke: var(--text3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  .search-wrap input {
    width: 100%;
    padding: 11px 14px 11px 38px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--teal-mid); }
  .search-wrap input::placeholder { color: var(--text3); }

  /* ── FILTER CHIPS ── */
  .chips-scroll {
    display: flex; gap: 8px;
    padding: 0 16px 14px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .chips-scroll::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    padding: 7px 15px;
    border: 1px solid var(--border2);
    background: var(--surface);
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
    -webkit-appearance: none;
  }
  .chip.active {
    background: var(--teal-dark);
    border-color: var(--teal-dark);
    color: #fff;
  }
  .chip.urgent-chip.active { background: var(--red); border-color: var(--red); }

  /* ── SECTION LABEL ── */
  .section-label {
    padding: 0 18px 10px;
    font-size: 12px;
    color: var(--text3);
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  /* ── NOTICE CARDS ── */
  .notices { padding: 0 12px; padding-bottom: calc(90px + var(--safe-bottom)); }

  .notice {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: transform .1s;
    animation: slideIn .2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .notice.urgent { border-left: 3px solid var(--red); }
  .notice.read { opacity: .55; }

  .notice-inner { padding: 14px 16px; }

  .notice-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 10px;
    margin-bottom: 7px;
  }

  .notice-title {
    font-size: 15px; font-weight: 600;
    color: var(--text); line-height: 1.35; flex: 1;
  }

  .badges { display: flex; flex-wrap: wrap; gap: 5px; flex-shrink: 0; }

  .badge {
    font-size: 11px; font-weight: 500;
    padding: 3px 8px; border-radius: 10px;
  }
  .badge-urgent { background: var(--red-light); color: var(--red-dark); }
  .badge-general { background: var(--teal-light); color: var(--teal-dark); }
  .badge-normativa { background: var(--blue-light); color: var(--blue-dark); }
  .badge-formacion { background: var(--amber-light); color: var(--amber-dark); }
  .badge-guardia { background: var(--pink-light); color: var(--pink-dark); }
  .badge-pedidos { background: var(--green-light); color: var(--green-dark); }
  .badge-rrhh { background: var(--purple-light); color: var(--purple-dark); }

  .notice-body {
    font-size: 14px; color: var(--text2);
    line-height: 1.55; margin-bottom: 12px;
  }

  .notice-footer {
    display: flex; align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 10px; margin-top: 2px;
  }

  .notice-meta { font-size: 12px; color: var(--text3); }
  .notice-meta span { display: block; margin-top: 1px; }

  .notice-btns { display: flex; gap: 6px; }

  .notice-btn {
    padding: 6px 12px;
    border: 1px solid var(--border2);
    background: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: var(--text2);
    cursor: pointer; transition: all .15s;
  }
  .notice-btn:active { transform: scale(0.96); background: var(--surface2); }
  .notice-btn.read-btn.is-read { color: var(--teal); border-color: var(--teal-mid); }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: calc(22px + var(--safe-bottom));
    right: 20px;
    width: 58px; height: 58px;
    background: var(--teal-dark);
    border: none;
    border-radius: 29px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(15,110,86,0.45);
    cursor: pointer;
    z-index: 40;
    transition: transform .15s, box-shadow .15s;
  }
  .fab:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(15,110,86,0.35); }
  .fab svg { width: 26px; height: 26px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; }

  /* ── BOTTOM SHEET MODAL ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .sheet-overlay.open { display: flex; }

  .sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 0 0 calc(20px + var(--safe-bottom));
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    animation: sheetUp .25s cubic-bezier(.32,0,.67,0);
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--border2);
    border-radius: 2px;
    margin: 12px auto 16px;
  }

  .sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sheet-title { font-size: 17px; font-weight: 600; }
  .sheet-close {
    width: 30px; height: 30px;
    background: var(--surface2);
    border: none; border-radius: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text2); font-size: 18px; line-height: 1;
  }

  .sheet-body { padding: 18px; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; letter-spacing: .03em; }
  .field input, .field textarea, .field select {
    width: 100%;
    padding: 13px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
    -webkit-appearance: none;
    appearance: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--teal-mid);
    background: var(--surface);
  }
  .field textarea { min-height: 90px; resize: none; }

  .toggle-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--surface2);
    border-radius: 12px;
    margin-bottom: 16px;
  }
  .toggle-label { font-size: 15px; color: var(--text); }
  .toggle-sub { font-size: 12px; color: var(--text3); }

  .toggle {
    width: 48px; height: 28px;
    background: var(--border2);
    border-radius: 14px;
    position: relative;
    cursor: pointer;
    transition: background .2s;
    flex-shrink: 0;
    border: none;
  }
  .toggle.on { background: var(--teal); }
  .toggle::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    background: #fff;
    border-radius: 11px;
    top: 3px; left: 3px;
    transition: transform .2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .toggle.on::after { transform: translateX(20px); }

  .btn-save {
    width: 100%;
    padding: 15px;
    background: var(--teal-dark);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .btn-save:active { transform: scale(0.98); background: #085041; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon {
    width: 64px; height: 64px;
    background: var(--surface2);
    border-radius: 32px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .empty-icon svg { width: 30px; height: 30px; stroke: var(--text3); fill: none; stroke-width: 1.5; }
  .empty h3 { font-size: 16px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .empty p { font-size: 14px; }

  /* ── INSTALL BANNER ── */
  .install-banner {
    margin: 0 12px 12px;
    background: var(--teal-light);
    border: 1px solid var(--teal-mid);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .install-banner p { font-size: 13px; color: var(--teal-dark); flex: 1; line-height: 1.4; }
  .install-btn {
    background: var(--teal-dark); color: #fff;
    border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 500;
    cursor: pointer; flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
  }
  .install-close {
    background: none; border: none; color: var(--teal-dark);
    font-size: 18px; cursor: pointer; flex-shrink: 0; line-height: 1;
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <div class="header-icon">
      <svg viewBox="logo.jpg" style="width:100%; height:100%; border-radius:10px;">
    </div>
    <div>
      <div class="header-title">Avisos</div>
      <div class="header-sub">Asociación Farmacéutica</div>
    </div>
  </div>
  <div class="header-badge" id="unread-badge" style="display:none"></div>
</header>

<div id="install-banner" class="install-banner" style="display:none;margin-top:12px">
  <p>Instala esta app en tu móvil para acceder sin navegador</p>
  <button class="install-btn" id="install-btn">Instalar</button>
  <button class="install-close" id="install-close">×</button>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="search-wrap">
  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="text" id="search" placeholder="Buscar avisos…" autocomplete="off" />
</div>

<div class="chips-scroll" id="chips"></div>

<div class="section-label" id="section-label">Avisos recientes</div>

<div class="notices" id="notices-list"></div>

<button class="fab" id="fab" title="Nuevo aviso">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- BOTTOM SHEET -->
<div class="sheet-overlay" id="sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title" id="sheet-title">Nuevo aviso</span>
      <button class="sheet-close" id="sheet-close">×</button>
    </div>
    <div class="sheet-body">
      <div class="field">
        <label>Título del aviso</label>
        <input type="text" id="f-title" placeholder="Ej: Actualización protocolo…" />
      </div>
      <div class="field">
        <label>Categoría</label>
        <select id="f-cat">
          <option value="general">General</option>
          <option value="normativa">Normativa</option>
          <option value="formacion">Formación</option>
          <option value="guardia">Guardia</option>
          <option value="pedidos">Pedidos</option>
          <option value="rrhh">RRHH</option>
        </select>
      </div>
      <div class="field">
        <label>Mensaje</label>
        <textarea id="f-body" placeholder="Escribe el contenido del aviso…"></textarea>
      </div>
      <div class="field">
        <label>Publicado por</label>
        <input type="text" id="f-author" placeholder="Tu nombre" />
      </div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Marcar como urgente</div>
          <div class="toggle-sub">Aparece destacado en rojo</div>
        </div>
        <button class="toggle" id="f-urgent" role="switch" aria-checked="false"></button>
      </div>
      <button class="btn-save" id="btn-save">Guardar aviso</button>
    </div>
  </div>
</div>

<script>
const KEY = 'farmacia_avisos_pwa_v1';

const CAT_LABELS = { general:'General', normativa:'Normativa', formacion:'Formación', guardia:'Guardia', pedidos:'Pedidos', rrhh:'RRHH' };

const DEFAULTS = [
  {id:1,title:'Actualización protocolo dispensación antibióticos',category:'normativa',body:'A partir del 20 de abril se requiere receta electrónica para todos los antibióticos. Revisar el documento en la intranet del colegio.',author:'Dirección',date:'2026-04-17',urgent:true,read:false},
  {id:2,title:'Formación en dermofarmacia — Inscripciones abiertas',category:'formacion',body:'Webinar gratuito el próximo 25 de abril. Plazas limitadas. Acceder a través del portal del Colegio Oficial de Farmacéuticos.',author:'Marta G.',date:'2026-04-16',urgent:false,read:false},
  {id:3,title:'Turno de guardia — fin de semana 26-27 abril',category:'guardia',body:'Recordatorio: el turno de guardia de este fin de semana corresponde a nuestra farmacia. Horario: sábado 21h a domingo 9h.',author:'Carmen R.',date:'2026-04-15',urgent:true,read:false},
  {id:4,title:'Rotura de stock paracetamol 1g — Almacén ABC',category:'pedidos',body:'Se confirma rotura de stock hasta el 22 de abril. Orientar al cliente hacia presentaciones alternativas disponibles.',author:'Toni M.',date:'2026-04-14',urgent:false,read:true},
  {id:5,title:'Solicitud de vacaciones antes del 30 de abril',category:'rrhh',body:'Para organizar la cobertura de verano, enviar solicitud antes de fin de mes al responsable de turno de cada farmacia.',author:'Olga P.',date:'2026-04-12',urgent:false,read:true},
];

function load(){ try{ const d=localStorage.getItem(KEY); return d?JSON.parse(d):DEFAULTS; }catch(e){ return DEFAULTS; } }
function save(n){ try{ localStorage.setItem(KEY,JSON.stringify(n)); }catch(e){} }

let notices = load();
let filter = 'todos';
let search = '';
let editId = null;
let urgentOn = false;

function filtered(){
  return notices.filter(n=>{
    const mf = filter==='todos' || (filter==='urgente'?n.urgent:n.category===filter);
    const ms = !search || n.title.toLowerCase().includes(search) || n.body.toLowerCase().includes(search);
    return mf && ms;
  }).sort((a,b)=>{
    if(a.urgent&&!b.urgent) return -1;
    if(!a.urgent&&b.urgent) return 1;
    return new Date(b.date)-new Date(a.date);
  });
}

function fmtDate(d){
  return new Date(d+'T00:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'});
}

function renderStats(){
  const total=notices.length, unread=notices.filter(n=>!n.read).length, urg=notices.filter(n=>n.urgent&&!n.read).length;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-pill"><strong>${total}</strong> avisos</div>
    <div class="stat-pill"><strong>${unread}</strong> sin leer</div>
    <div class="stat-pill urgent"><strong>${urg}</strong> urgentes</div>
  `;
  const b=document.getElementById('unread-badge');
  if(unread>0){ b.textContent=unread; b.style.display='flex'; } else { b.style.display='none'; }
}

function renderChips(){
  const cats = [['todos','Todos'],['urgente','Urgente'],['normativa','Normativa'],['formacion','Formación'],['guardia','Guardia'],['pedidos','Pedidos'],['rrhh','RRHH']];
  document.getElementById('chips').innerHTML = cats.map(([v,l])=>`
    <button class="chip${filter===v?' active':''}${v==='urgente'?' urgent-chip':''}" data-filter="${v}">${l}</button>
  `).join('');
}

function renderNotices(){
  const list=filtered();
  const el=document.getElementById('notices-list');
  document.getElementById('section-label').textContent = filter==='todos'?`Recientes (${list.length})`:`${list.length} aviso${list.length!==1?'s':''}`;
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><h3>Sin avisos</h3><p>No hay avisos que mostrar</p></div>`;
    return;
  }
  el.innerHTML = list.map(n=>`
    <div class="notice${n.urgent?' urgent':''}${n.read?' read':''}" id="notice-${n.id}">
      <div class="notice-inner">
        <div class="notice-top">
          <div class="notice-title">${n.title}</div>
          <div class="badges">
            ${n.urgent?'<span class="badge badge-urgent">Urgente</span>':''}
            <span class="badge badge-${n.category}">${CAT_LABELS[n.category]||n.category}</span>
          </div>
        </div>
        <div class="notice-body">${n.body}</div>
        <div class="notice-footer">
          <div class="notice-meta">
            <strong>${n.author}</strong>
            <span>${fmtDate(n.date)}</span>
          </div>
          <div class="notice-btns">
            <button class="notice-btn read-btn${n.read?' is-read':''}" onclick="toggleRead(${n.id})">${n.read?'✓ Leído':'Marcar leído'}</button>
            <button class="notice-btn" onclick="openEdit(${n.id})">Editar</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function render(){ renderStats(); renderChips(); renderNotices(); }

window.toggleRead = function(id){
  notices = notices.map(n=>n.id===id?{...n,read:!n.read}:n);
  save(notices); render();
};

window.openEdit = function(id){
  const n=notices.find(x=>x.id===id); if(!n) return;
  editId=id;
  document.getElementById('f-title').value=n.title;
  document.getElementById('f-cat').value=n.category;
  document.getElementById('f-body').value=n.body;
  document.getElementById('f-author').value=n.author;
  urgentOn=n.urgent;
  updateToggle();
  document.getElementById('sheet-title').textContent='Editar aviso';
  document.getElementById('sheet').classList.add('open');
};

function updateToggle(){
  const t=document.getElementById('f-urgent');
  t.classList.toggle('on',urgentOn);
  t.setAttribute('aria-checked',String(urgentOn));
}

document.getElementById('f-urgent').onclick=function(){
  urgentOn=!urgentOn; updateToggle();
};

document.getElementById('fab').onclick=function(){
  editId=null;
  document.getElementById('f-title').value='';
  document.getElementById('f-cat').value='general';
  document.getElementById('f-body').value='';
  document.getElementById('f-author').value='';
  urgentOn=false; updateToggle();
  document.getElementById('sheet-title').textContent='Nuevo aviso';
  document.getElementById('sheet').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),300);
};

document.getElementById('sheet-close').onclick=function(){
  document.getElementById('sheet').classList.remove('open');
};
document.getElementById('sheet').onclick=function(e){
  if(e.target===this) this.classList.remove('open');
};

document.getElementById('btn-save').onclick=function(){
  const title=document.getElementById('f-title').value.trim();
  const body=document.getElementById('f-body').value.trim();
  const author=document.getElementById('f-author').value.trim()||'Anónimo';
  const category=document.getElementById('f-cat').value;
  if(!title||!body){ document.getElementById('f-title').focus(); return; }
  const today=new Date().toISOString().split('T')[0];
  if(editId){
    notices=notices.map(n=>n.id===editId?{...n,title,body,author,category,urgent:urgentOn}:n);
  } else {
    notices=[{id:Date.now(),title,category,body,author,date:today,urgent:urgentOn,read:false},...notices];
  }
  save(notices); render();
  document.getElementById('sheet').classList.remove('open');
};

document.getElementById('chips').onclick=function(e){
  const btn=e.target.closest('.chip'); if(!btn) return;
  filter=btn.dataset.filter; render();
};

document.getElementById('search').oninput=function(){
  search=this.value.toLowerCase().trim(); render();
};

// PWA install prompt
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('install-banner').style.display='flex';
});
document.getElementById('install-btn').onclick=async function(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const r=await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('install-banner').style.display='none';
};
document.getElementById('install-close').onclick=function(){
  document.getElementById('install-banner').style.display='none';
};

render();
</script>

</body>
</html>
